services:
  app:
    build: .
    restart: unless-stopped
    depends_on: [mongo, minio]
    env_file: .env.prod
    environment:
      MONGODB_URI: mongodb://mongo:27017/the-frame
    ports:
      - "192.168.1.14:3031:3000"   # Caddy가 192.168.1.14:3031 프록시

  mongo:
    image: mongo:4.4   # 서버 CPU AVX 미지원 대응
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "192.168.1.14:9000:9000"   # Caddy가 s3.bluewarn.dev로 프록시
      - "192.168.1.14:9001:9001"   # 관리자 콘솔

  umami-db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD}
    volumes:
      - umami-db:/var/lib/postgresql/data

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    depends_on: [umami-db]
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD}@umami-db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET}
    ports:
      - "192.168.1.14:3040:3000"   # 필요시 Caddy로 노출

volumes:
  mongo-data:
  minio-data:
  umami-db:
